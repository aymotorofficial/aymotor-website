<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AY Motor | Premium Auto Dealer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:white;
}

header{
background:linear-gradient(135deg,#000,#1a1a1a);
padding:80px 20px;
text-align:center;
border-bottom:3px solid #d4af37;
}

header h1{
font-size:44px;
margin:0;
color:#d4af37;
letter-spacing:4px;
}

header p{
color:#bbb;
margin-top:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.section-title{
text-align:center;
font-size:30px;
margin-bottom:40px;
color:#d4af37;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#181818;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.3s;
padding:25px;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 40px rgba(212,175,55,0.2);
}

.card h3{
margin:0;
font-size:20px;
}

.price{
margin:12px 0;
color:#d4af37;
font-weight:600;
font-size:18px;
}

.btn{
display:inline-block;
background:#d4af37;
color:black;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.btn:hover{
background:#c39c2d;
}

footer{
text-align:center;
padding:40px 20px;
color:#777;
border-top:1px solid #222;
}

.floating-wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 20px;
border-radius:50px;
text-decoration:none;
font-weight:600;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<header>
<h1>AY MOTOR</h1>
<p>Premium Car Broker & Dealer Malaysia</p>
</header>

<div class="container">
<div class="section-title">Stok Kereta Terkini</div>

<div class="grid">

<div class="card">
<h3>TOYOTA VELLFIRE 2018</h3>
<div class="price">RM 98,000</div>
<a href="https://wa.me/60179173381" target="_blank" class="btn">Tanya WhatsApp</a>
</div>

<div class="card">
<h3>HONDA CIVIC 2019</h3>
<div class="price">RM 75,000</div>
<a href="https://wa.me/60179173381" target="_blank" class="btn">Tanya WhatsApp</a>
</div>

</div>
</div>

<footer>
© 2025 AY Motor. All Rights Reserved.
</footer>

<a class="floating-wa" href="https://wa.me/60179173381" target="_blank">
WhatsApp Kami
</a>

</body>
</html>
